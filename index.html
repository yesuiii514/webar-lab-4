<!doctype html>
<html lang="mn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebAR Lab - Model Viewer</title>

  <!-- model-viewer -->
  <script
    type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }
    header {
      padding: 12px 16px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
    }
    model-viewer {
      width: 100vw;
      height: calc(100vh - 72px);
      background: #f5f5f5;
    }
    .hint {
      color: #444;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <header>
    <h3 style="margin:0;">QR → WebAR Lab</h3>
    <div class="hint">
      3D-г эргүүлж / томруулж болно. AR товчийг дарж камер дээр байрлуул.
    </div>
  </header>

  <model-viewer
    src="./assets/cute_character.glb"
    alt="3D model in AR"

    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-placement="floor"

    camera-controls
    auto-rotate

    shadow-intensity="0.8"
    exposure="1"
    environment-image="neutral"

    loading="eager"
    reveal="auto"
  >
  </model-viewer>
</body>
</html>
